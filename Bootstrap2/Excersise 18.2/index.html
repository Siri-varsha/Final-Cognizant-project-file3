<!DOCTYPE html>
<html>
<head>
  <title>Bootstrap Accordion</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-5">

  <h2 class="text-center mb-4">FAQs</h2>

  <!-- ✅ Accordion -->
  <div class="accordion" id="myAccordion">

    <!-- Item 1 -->
    <div class="accordion-item">
      <h2 class="accordion-header">
        <button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#item1">
          What is Bootstrap?
        </button>
      </h2>
      <div id="item1" class="accordion-collapse collapse show" data-bs-parent="#myAccordion">
        <div class="accordion-body">
          Bootstrap is a CSS framework used to build responsive websites.
        </div>
      </div>
    </div>

    <!-- Item 2 -->
    <div class="accordion-item">
      <h2 class="accordion-header">
        <button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#item2">
          Why use Bootstrap?
        </button>
      </h2>
      <div id="item2" class="accordion-collapse collapse" data-bs-parent="#myAccordion">
        <div class="accordion-body">
          It helps build fast, responsive, and modern UI easily.
        </div>
      </div>
    </div>

    <!-- Item 3 -->
    <div class="accordion-item">
      <h2 class="accordion-header">
        <button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#item3">
          Is Bootstrap easy?
        </button>
      </h2>
      <div id="item3" class="accordion-collapse collapse" data-bs-parent="#myAccordion">
        <div class="accordion-body">
          Yes! It's beginner-friendly and widely used in industry.
        </div>
      </div>
    </div>

  </div>

  <!-- ✅ Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
