<!DOCTYPE html>
<html>
<head>
  <title>Spacing Utilities</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <!-- Section 1 -->
  <div class="bg-light m-2 p-1">
    <h4 class="mt-4">Section 1</h4>
    <p>This section uses margin (m-2) and padding (p-1).</p>
  </div>

  <!-- Section 2 -->
  <div class="bg-secondary text-white mx-3 py-4">
    <h4>Section 2</h4>
    <p>This section uses horizontal margin (mx-3) and vertical padding (py-5).</p>
  </div>

  <!-- Section 3 -->
  <div class="bg-info text-white mt-3 p-"3>
    <h4>Section 3</h4>
    <p>This section uses top margin (mt-3) and padding (p-3).</p>
  </div>

</body>
</html>
