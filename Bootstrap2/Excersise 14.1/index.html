<!DOCTYPE html>
<html>
<head>
  <title>Display Utilities</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

  <!-- Hidden on all screens -->
  <div class="d-none bg-danger text-white p-3 mb-3">
    This is hidden everywhere
  </div>

  <!-- Visible only on md and above -->
  <div class="d-none d-md-block bg-success text-white p-3 mb-3">
    Visible on Tablet and Desktop
  </div>

  <!-- Flex only on large screens -->
  <div class="d-none d-lg-flex bg-primary text-white p-3">
    <div class="me-3">Item 1</div>
    <div class="me-3">Item 2</div>
    <div>Item 3</div>
  </div>

</body>
</html>
