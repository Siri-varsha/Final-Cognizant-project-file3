<!DOCTYPE html>
<html>
<head>
  <title>Pricing Section</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container py-5">

    <h2 class="text-center mb-5">Pricing Plans</h2>

    <div class="row text-center">

      <!-- Basic -->
      <div class="col-md-4 mb-4">
        <div class="card p-4 m-2">
          <h4 class="mb-3">Basic</h4>
          <h2 class="mb-3">$9</h2>
          <p class="text-muted">For beginners</p>
          <button class="btn btn-outline-primary mt-3">Choose</button>
        </div>
      </div>

      <!-- Standard -->
      <div class="col-md-4 mb-4">
        <div class="card p-4 m-2 border-primary">
          <h4 class="mb-3">Standard</h4>
          <h2 class="mb-3">$19</h2>
          <p class="text-muted">Most popular plan</p>
          <button class="btn btn-primary mt-3">Choose</button>
        </div>
      </div>

      <!-- Premium -->
      <div class="col-md-4 mb-4">
        <div class="card p-4 m-2">
          <h4 class="mb-3">Premium</h4>
          <h2 class="mb-3">$29</h2>
          <p class="text-muted">For professionals</p>
          <button class="btn btn-outline-dark mt-3">Choose</button>
        </div>
      </div>

    </div>

  </div>

</body>
</html>
