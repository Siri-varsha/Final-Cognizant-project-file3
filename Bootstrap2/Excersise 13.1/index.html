<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container py-5">

    <h2 class="text-center mb-5">Dashboard</h2>

    <div class="row text-center">

      <!-- Card 1 -->
      <div class="col-md-3 mb-4">
        <div class="p-4 bg-primary text-white rounded">
          <h4>Users</h4>
          <h2>1,200</h2>
        </div>
      </div>

      <!-- Card 2 -->
      <div class="col-md-3 mb-4">
        <div class="p-4 bg-success text-white rounded">
          <h4>Sales</h4>
          <h2>$8,500</h2>
        </div>
      </div>

      <!-- Card 3 -->
      <div class="col-md-3 mb-4">
        <div class="p-4 bg-warning text-dark rounded">
          <h4>Orders</h4>
          <h2>320</h2>
        </div>
      </div>

      <!-- Card 4 -->
      <div class="col-md-3 mb-4">
        <div class="p-4 bg-danger text-white rounded">
          <h4>Issues</h4>
          <h2>15</h2>
        </div>
      </div>

    </div>

  </div>

</body>
</html>
