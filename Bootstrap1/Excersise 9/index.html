<!DOCTYPE html>
<html>
<head>
  <title>Bootstrap Typography</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

  <!-- Display Heading -->
  <h1 class="display-1">Display 1 Heading</h1>

  <!-- Lead Paragraph -->
  <p class="lead">
    This is a lead paragraph. It stands out from normal text.
  </p>

  <!-- Normal Paragraph -->
  <p>
    This is a normal paragraph for comparison.
  </p>

  <!-- Muted Text -->
  <p class="text-muted">
    This text is muted (lighter color).
  </p>

  <!-- Bold Text -->
  <p class="fw-bold">
    This text is bold.
  </p>

  <!-- Italic -->
  <p class="fst-italic">
    This text is italic.
  </p>

</body>
</html>
