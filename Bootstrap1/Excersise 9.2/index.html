<!DOCTYPE html>
<html>
<head>
  <title>Button Groups</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

  <!-- Button Group -->
  <h3>Button Group</h3>
  <div class="btn-group">
    <button class="btn btn-primary">Left</button>
    <button class="btn btn-primary">Middle</button>
    <button class="btn btn-primary">Right</button>
  </div>

  <hr>

  <!-- Toggle Buttons -->
  <h3>Toggle Buttons</h3>
  <div class="btn-group" role="group">

    <input type="checkbox" class="btn-check" id="btn1" autocomplete="off">
    <label class="btn btn-outline-primary" for="btn1">Option 1</label>

    <input type="checkbox" class="btn-check" id="btn2" autocomplete="off">
    <label class="btn btn-outline-success" for="btn2">Option 2</label>

    <input type="checkbox" class="btn-check" id="btn3" autocomplete="off">
    <label class="btn btn-outline-danger" for="btn3">Option 3</label>

  </div>

</body>
</html>
